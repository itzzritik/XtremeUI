name: Publish

on:
    workflow_dispatch:
        inputs:
            version:
                description: Release bump
                required: true
                default: patch
                type: choice
                options:
                    - patch
                    - minor
                    - major
    push:
        branches:
            - main

permissions:
    contents: write
    id-token: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    publish:
        if: github.actor != 'itzzjarvis'
        name: Publish ${{ github.event_name == 'push' && 'patch' || inputs.version }} version to npm
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org/'

            - uses: pnpm/action-setup@v4
              with:
                  version: latest
                  run_install: true

            - name: Setup Git & SSH signing
              run: |
                  git config user.email "ritik.jarvis@gmail.com"
                  git config user.name "Jarvis"
                  mkdir -p ~/.ssh/
                  echo "${{ secrets.JARVIS_SSH_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan github.com >> ~/.ssh/known_hosts
                  git config gpg.format ssh
                  git config user.signingkey ~/.ssh/id_rsa
                  git config commit.gpgsign true
                  git config tag.gpgsign true
                  npm config set sign-git-tag true

            - name: Bump version & sign tag
              env:
                  RELEASE_TYPE: ${{ inputs.version || 'patch' }}
              run: |
                  TAG="$(npm version "$RELEASE_TYPE" --no-git-tag-version)"
                  git tag -d "$TAG" 2>/dev/null || true
                  git push origin ":refs/tags/$TAG" 2>/dev/null || true
                  git commit -am "🤖 Jarvis published a $RELEASE_TYPE version"
                  git tag -s -m "🤖 Jarvis published a $RELEASE_TYPE version" "$TAG"

            - name: Build package
              run: pnpm build

            - name: Publish to npm
              run: npm publish --access public --provenance

            - name: Push commit & tag
              run: git push --follow-tags
